[preview]
max_width = 2000
max_height = 2000

[mgr]
sort_by = "alphabetical"
title_format = "yazi - {cwd}"

[[plugin.prepend_fetchers]]
url   = "local://*"
run   = "mime-ext.local"
prio  = "high"
group = "mime"

[[plugin.prepend_fetchers]]
url   = "remote://*"
run   = "mime-ext.remote"
prio  = "high"
group = "mime"

[tasks]
suppress_preload = true
